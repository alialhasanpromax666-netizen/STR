services:
  - type: web
    name: str11
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run serve
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://str11.onrender.com
